info:
  version: 0.0.0
  description: DNF sample configuration

configuration:
  sbi:
    scheme: http
    registerIPv4: 127.0.0.101
    bindingIPv4: 127.0.0.101
    port: 8000
    tls:
  serviceNameList:
    - ndnf-dummy
  nrfUri: http://127.0.0.10:8000
  nrfCertPem: cert/nrf.pem
  udmUri: http://127.0.0.3:8000
  searchSupi: 208930000000001
  searchMCC: 208
  searchMNC: 93

logger:
  enable: true
  level: info
  reportCaller: false