info:
  version: 0.0.0
  description: DNF sample configuration

configuration:
  sbi:
    scheme: http
    registerIPv4: 127.0.0.101
    bindingIPv4: 127.0.0.101
    port: 8000
  serviceNameList:
    - ndnf-dummy
  nrfUri: http://127.0.0.10:8000

logger:
  enable: true
  level: info
  reportCaller: false